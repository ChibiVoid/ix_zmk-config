# Use NFC pads as GPIOS
CONFIG_NFCT_PINS_AS_GPIOS=y

# Enable deep sleep
CONFIG_ZMK_SLEEP=y

# 1. 電波強度を最大にする
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 実験的な接続機能を無効化（フリーズの原因になることがあるため、一旦オフを推奨）
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=n

# ポインティングデバイス（マウス等）機能
CONFIG_ZMK_POINTING=y

# キーイベントのキューサイズを拡張（これは有効なシンボルです）
CONFIG_ZMK_KSCAN_EVENT_QUEUE_SIZE=64

# 2. 接続の維持（コネクション・パラメータ）を安定重視にする
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# 3. セキュリティの再試行を許可する
CONFIG_ZMK_BLE_PASSIVE_SCANNER_TIMEOUT=60